<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Control Center</title>
    <style>
        /* Dark Theme aur Professional Dashboard UI */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .graveyard { border-color: #ff4c4c; background: #2a1212; }
        .stats { font-size: 32px; font-weight: bold; }
        .text-green { color: #4ade80; } .text-yellow { color: #facc15; } .text-red { color: #f87171; }
        .job-item { background: #2d2d2d; margin: 10px 0; padding: 12px; border-radius: 6px; border-left: 4px solid #3b82f6; font-family: monospace; font-size: 14px; }
        .job-item.processing { border-left-color: #facc15; }
        .job-item.failed { border-left-color: #f87171; }
        button { padding: 10px 20px; margin-right: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-chaos { background: #ef4444; color: white; }
        .btn-chaos:hover { background: #dc2626; }
    </style>
</head>
<body>

    <h1>🎛️ Queue Control Center</h1>
    
    <div>
        <button class="btn-primary" onclick="spawnJob('NORMAL_TASK')">➕ Spawn 1 Job</button>
        <button class="btn-chaos" onclick="spawnBulkJobs()">🧨 Spawn 10 Jobs (Load Test)</button>
        <button class="btn-chaos" onclick="clearGraveyard()" style="background: #4b5563;">🧹 Clear Graveyard</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📊 Live Engine Stats</h3>
            <p>Queued Jobs: <span id="stat-queued" class="stats text-green">0</span></p>
            <p>Processing: <span id="stat-processing" class="stats text-yellow">0</span></p>
            <p>Total Failed: <span id="stat-failed" class="stats text-red">0</span></p>
        </div>

        <div class="card">
            <h3>⏳ The Conveyor Belt (Live Jobs)</h3>
            <div id="live-jobs">Fetching data...</div>
        </div>

        <div class="card graveyard">
            <h3>💀 The Graveyard (DLQ)</h3>
            <p style="font-size: 12px; color: #ccc;">Jobs failed 3+ times end up here.</p>
            <div id="dlq-jobs">Fetching data...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        // 1. Stats Fetch Karna
        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/stats`);
                const data = await res.json();
                document.getElementById('stat-queued').innerText = data.queued || 0;
                document.getElementById('stat-processing').innerText = data.processing || 0;
                document.getElementById('stat-failed').innerText = data.failed || 0;
            } catch (e) { console.error("Stats Error"); }
        }

        // 2. Live Jobs Fetch Karna
        async function fetchJobs() {
            try {
                const res = await fetch(`${API_BASE}/jobs`);
                const jobs = await res.json();
                const container = document.getElementById('live-jobs');
                container.innerHTML = jobs.map(job => `
                    <div class="job-item ${job.status}">
                        <strong>[ID: ${job.id}]</strong> ${job.job_type} <br>
                        State: ${job.status.toUpperCase()} | Retries: ${job.retry_count}
                    </div>
                `).join('');
            } catch (e) { console.error("Jobs Error"); }
        }

        // 3. DLQ Fetch Karna
        async function fetchDLQ() {
            try {
                const res = await fetch(`${API_BASE}/dlq`);
                const jobs = await res.json();
                const container = document.getElementById('dlq-jobs');
                container.innerHTML = jobs.map(job => `
                    <div class="job-item failed">
                        <strong>[ID: ${job.id}]</strong> ${job.job_type} <br>
                        Error: <span class="text-red">${job.error_reason}</span>
                    </div>
                `).join('');
            } catch (e) { console.error("DLQ Error"); }
        }

        // Action: Naya job add karna
        async function spawnJob(type) {
            await fetch(`${API_BASE}/add-job`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: type, payload: { timestamp: Date.now() } })
            });
            updateDashboard(); // Turant refresh karo
        }

        // Action: Load test ke liye ek sath 10 jobs daalna
        async function spawnBulkJobs() {
            for(let i=0; i<10; i++) {
                spawnJob('BULK_LOAD_TEST');
            }
        }

        // Action: Graveyard ko khali karne ke liye
        async function clearGraveyard() {
        if (confirm("Kya sach mein graveyard saaf karna hai?")) {
            await fetch(`${API_BASE}/dlq/clear`, {
            method: 'DELETE'
        });
        updateDashboard(); // UI ko turant refresh karo
    }
}

        // Dashboard ko refresh karne ka master function
        function updateDashboard() {
            fetchStats();
            fetchJobs();
            fetchDLQ();
        }

        // Har 1 second mein dashboard automatically update hoga
        setInterval(updateDashboard, 1000);
        updateDashboard(); // First load
    </script>
</body>
</html>
